<!DOCTYPE html>
<html>
<head>
    <title>Thank You | Apexiol</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        body { background:#f7f9fc; display:flex; justify-content:center; align-items:center; min-height:100vh; }
        .card { background:white; max-width:500px; padding:50px; border-radius:32px; text-align:center; box-shadow:0 25px 45px -12px rgba(0,0,0,0.2); }
        h1 { color:#0b1f3a; margin:20px 0 10px; }
        p { color:#555; margin-bottom:30px; }
        .btn { background:#f5c542; color:#0b1f3a; padding:12px 30px; border-radius:40px; text-decoration:none; font-weight:600; display:inline-block; }
        .btn:hover { background:#ffd966; }
    </style>
</head>
<body>
<div class="card">
    <div style="font-size:64px;">✅</div>
    <h1>Thank You!</h1>
    <p>Your message has been sent successfully.<br>We will get back to you within 24 hours.</p>
    <a href="javascript:history.back()" class="btn">← Go Back</a>
</div>
</body>
</html>
